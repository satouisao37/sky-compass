<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101418">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>スカイコンパス</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="vendor/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p id="dateLabel" class="date-label">--</p>
      <p id="placeLabel" class="place-label">位置を確認中</p>
    </div>
    <div class="topbar-actions">
      <button id="locateBtn" type="button">現在地</button>
      <button id="shareBtn" type="button">共有</button>
    </div>
  </header>

  <main>
    <section class="time-panel">
      <div class="date-controls">
        <button id="prevDay" type="button" aria-label="前日">◀</button>
        <input id="dateInput" type="date">
        <button id="nextDay" type="button" aria-label="翌日">▶</button>
        <button id="nowBtn" type="button">今</button>
      </div>
      <label class="slider-label" for="timeSlider"><span>時刻</span><strong id="timeLabel">--:--</strong></label>
      <input id="timeSlider" type="range" min="0" max="1435" step="5" value="720">
      <div class="timeline">
        <svg id="timelineBar" class="timeline-bar" viewBox="0 0 1440 56" preserveAspectRatio="none" role="img" aria-label="1日の光と月のタイムライン(タップで時刻移動)">
          <defs>
            <linearGradient id="twilightGrad" x1="0" y1="0" x2="1" y2="0"></linearGradient>
          </defs>
          <rect id="tlSky" x="0" y="0" width="1440" height="56" fill="url(#twilightGrad)"/>
          <g id="tlMoon"></g>
          <g id="tlGB"></g>
          <g id="tlHours"></g>
          <g id="tlSun"></g>
          <line id="tlNow" class="tl-indicator" y1="0" y2="56" vector-effect="non-scaling-stroke"/>
        </svg>
        <div id="tlNowHandle" class="tl-indicator-handle" aria-hidden="true"></div>
        <div id="timelineAxis" class="timeline-axis" aria-hidden="true"></div>
        <div id="timelineEvents" class="timeline-events"></div>
      </div>
    </section>

    <section class="compass-section" aria-label="空のコンパス">
      <div class="mode-toggle" role="group" aria-label="表示モード">
        <button id="mode2dBtn" type="button" class="active" aria-pressed="true">2Dコンパス</button>
        <button id="mode3dBtn" type="button" aria-pressed="false">3Dかざし</button>
        <button id="modeSphereBtn" type="button" aria-pressed="false">天球</button>
        <button id="modeMapBtn" type="button" aria-pressed="false">地図</button>
      </div>
      <div class="compass-wrap">
        <svg id="skySvg" class="sky" viewBox="-120 -120 240 240" role="img" aria-label="太陽と月の方位高度">
          <defs>
            <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <g id="rotatingSky">
            <circle class="horizon" cx="0" cy="0" r="100"/>
            <g id="ticks"></g>
            <g class="cardinals">
              <text x="0" y="-104">N</text><text x="104" y="4">E</text>
              <text x="0" y="112">S</text><text x="-104" y="4">W</text>
            </g>
            <g id="sunPath"></g>
            <g id="moonPath"></g>
            <g id="galaxy2d"></g>
            <g id="sunMarker"></g>
            <g id="moonMarker"></g>
          </g>
        </svg>
        <div id="sky3d" class="sky-3d" aria-label="3Dかざしモード" hidden>
          <svg id="sky3dRef" class="sky-3d-ref" aria-hidden="true"></svg>
          <svg id="sky3dPaths" class="sky-3d-paths" aria-hidden="true"></svg>
          <div id="sun3d" class="sky-3d-body sun-3d">
            <span class="body-disc"></span>
            <span class="body-label">太陽</span>
          </div>
          <div id="moon3d" class="sky-3d-body moon-3d">
            <span class="body-disc"></span>
            <span class="body-label">月</span>
          </div>
          <div id="sunGuide" class="sky-3d-guide sun-guide"><span class="guide-arrow"></span><b>太陽</b></div>
          <div id="moonGuide" class="sky-3d-guide moon-guide"><span class="guide-arrow"></span><b>月</b></div>
          <div id="sky3dStatus" class="sky-3d-status">コンパス連動を許可してください</div>
        </div>
        <svg id="sphereSvg" class="sphere-sky hidden" viewBox="-120 -120 240 240" role="img" aria-label="天球上の太陽と月の経路">
          <defs>
            <filter id="sphereGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <g id="sphereGround"></g>
          <g id="sphereGridBack"></g>
          <g id="spherePathsBack"></g>
          <g id="sphereGridFront"></g>
          <g id="spherePathsFront"></g>
          <g id="sphereGalaxy"></g>
          <g id="sphereMarkers"></g>
          <g id="sphereLabels"></g>
        </svg>
        <div id="mapView" class="map-view hidden" aria-label="地図上の選択地点の天球">
          <div id="mapCanvas" class="map-canvas"></div>
          <div id="mapMarker" class="map-marker" aria-hidden="true"></div>
          <div id="mapTargetMarker" class="map-target-marker" aria-hidden="true"></div>
          <div id="mapSphereMarker" class="map-sphere-marker" aria-hidden="true">
            <svg id="mapSphereSvg" class="map-sphere" viewBox="-120 -120 240 240">
              <defs>
                <filter id="mapGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="2" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>
              <g id="mapSphereGround"></g>
              <g id="mapSphereGridBack"></g>
              <g id="mapSpherePathsBack"></g>
              <g id="mapSphereGridFront"></g>
              <g id="mapSpherePathsFront"></g>
              <g id="mapSphereGalaxy"></g>
              <g id="mapSphereMarkers"></g>
              <g id="mapSphereLabels"></g>
            </svg>
          </div>
          <div class="map-controls" aria-label="地図操作">
            <button id="mapZoomIn" type="button" aria-label="拡大">+</button>
            <button id="mapZoomOut" type="button" aria-label="縮小">−</button>
            <button id="mapLocateBtn" type="button" class="map-locate-btn" aria-label="現在地へ戻る">◎</button>
            <button id="mapRaysBtn" type="button" class="map-rays-btn" aria-pressed="true" aria-label="太陽・月の方位線">レイ</button>
            <button id="mapTargetBtn" type="button" class="map-target-btn" aria-pressed="false" aria-label="目標地点を指定">目標</button>
          </div>
          <div class="map-sliders" aria-label="天球表示の調整">
            <label class="map-radius-label" for="mapRadiusInput">
              <span>天球</span>
              <input id="mapRadiusInput" type="range" min="20" max="160" step="1" value="90">
            </label>
            <label class="map-tilt-label" for="mapTiltInput">
              <span>傾き</span>
              <input id="mapTiltInput" type="range" min="0" max="60" step="1" value="0">
            </label>
            <label class="map-bearing-label" for="mapBearingInput">
              <span>回転</span>
              <input id="mapBearingInput" type="range" min="-180" max="180" step="1" value="0">
            </label>
          </div>
          <div class="map-bottom">
            <div id="mapLegend" class="map-legend" aria-hidden="true">
              <span class="lg-item"><span class="lg-line lg-sun"></span>太陽</span>
              <span class="lg-item"><span class="lg-line lg-moon"></span>月</span>
              <span class="lg-item"><span class="lg-line lg-solid"></span>現在</span>
              <span class="lg-item"><span class="lg-line lg-dashed"></span>出/入</span>
            </div>
            <div id="mapInfo" class="map-info"></div>
          </div>
        </div>
      </div>
      <div id="belowLabel" class="below-label"></div>
      <div class="compass-actions">
        <button id="compassBtn" type="button">コンパス連動</button>
        <span id="compassStatus">北上固定</span>
      </div>
    </section>

    <section class="cards">
      <article><h2>太陽</h2><p id="sunNow">--</p><p id="sunTimes">--</p></article>
      <article><h2>月</h2><p id="moonNow">--</p><p id="moonTimes">--</p><p id="moonDist">--</p></article>
      <article><h2>撮影時間</h2><p id="lightTimes">--</p></article>
      <article><h2>天の川</h2><p id="galaxyNow">--</p><p id="galaxyTimes">--</p></article>
      <article class="moon-cal">
        <h2>月相カレンダー</h2>
        <p id="moonPhaseNext">--</p>
        <div id="moonStrip" class="moon-strip"></div>
      </article>
    </section>

    <details class="align">
      <summary>アライメント検索(ダイヤモンド/パール富士)</summary>
      <div class="align-target-row">
        <p id="alignTargetStatus" class="align-target-status">地図モードで「目標」をタップして山頂などを指定してください</p>
        <button id="alignClearBtn" type="button" disabled>目標クリア</button>
      </div>
      <div class="align-controls">
        <div class="align-segment" role="group" aria-label="天体">
          <button id="alignSunBtn" type="button" aria-pressed="true">太陽</button>
          <button id="alignMoonBtn" type="button" aria-pressed="false">月</button>
        </div>
        <label>期間
          <select id="alignDaysSelect">
            <option value="90">3ヶ月</option>
            <option value="180">6ヶ月</option>
            <option value="366" selected>1年</option>
          </select>
        </label>
        <label>許容誤差
          <select id="alignToleranceSelect">
            <option value="0.3">±0.3°</option>
            <option value="0.5" selected>±0.5°</option>
            <option value="1.0">±1.0°</option>
          </select>
        </label>
        <button id="alignSearchBtn" type="button">検索</button>
      </div>
      <ul id="alignResults" class="align-results"></ul>
    </details>

    <details class="settings">
      <summary>設定</summary>
      <label class="night-toggle"><input id="nightToggle" type="checkbox"> 夜間赤色モード</label>
      <label>磁気偏角 <input id="declinationInput" type="number" step="0.1" value="-7.7"> 度</label>
      <p>実際の太陽の方向とズレる場合は 0 を試す</p>
      <div class="manual-loc">
        <label>緯度 <input id="latInput" type="number" step="0.0001"></label>
        <label>経度 <input id="lonInput" type="number" step="0.0001"></label>
        <button id="applyLocBtn" type="button">座標を適用</button>
      </div>
      <div class="favorites" aria-label="お気に入り地点">
        <h3 class="fav-title">お気に入り地点</h3>
        <div class="fav-save">
          <input id="favNameInput" type="text" maxlength="20" placeholder="地点名" aria-label="地点名">
          <button id="favSaveBtn" type="button">この地点を保存</button>
        </div>
        <p class="fav-hint">地図モードでは選択地点、それ以外では現在地を保存します</p>
        <ul id="favList" class="fav-list"></ul>
      </div>
    </details>

    <p class="app-version">スカイコンパス v0.22.0</p>
  </main>

  <script src="astro.js" defer></script>
  <script src="vendor/maplibre-gl.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
